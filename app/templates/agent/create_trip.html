{% extends "base.html" %}
{% block title %}Create Client Trip{% endblock %}
{% block content %}
<div class="row g-3">
    <div class="col-lg-3">{% include "partials/agent_sidebar.html" %}</div>
    <div class="col-lg-9">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h3 class="mb-3">Create Trip for Client</h3>
                <form method="post" action="{{ url_for('agent.create_trip') }}" id="trip-form">

                    {% set include_client = True %}
                    {% include "partials/trip_form_fields.html" %}
                    <div class="mt-4 d-grid d-md-flex justify-content-md-end">
                        <button class="btn btn-primary btn-lg">Generate Client Trip</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
