{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="mb-3">Forgot Password</h3>
                {% if otp_required %}
                    <form method="post" class="row g-3">
                        <input type="hidden" name="action" value="reset_password">
                        <div class="col-12">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" value="{{ otp_email }}" required readonly>
                        </div>
                        <div class="col-12">
                            <label class="form-label">OTP</label>
                            <input type="text" name="otp" class="form-control" maxlength="6" minlength="6" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">New Password</label>
                            <div class="input-group">
                                <input id="forgotNewPassword" type="password" name="new_password" class="form-control" required>
                                <button class="btn btn-outline-secondary password-toggle" type="button" data-target="forgotNewPassword">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Confirm New Password</label>
                            <div class="input-group">
                                <input id="forgotConfirmPassword" type="password" name="confirm_password" class="form-control" required>
                                <button class="btn btn-outline-secondary password-toggle" type="button" data-target="forgotConfirmPassword">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-12">
                            <small class="text-muted">Use 8+ chars with uppercase, lowercase, number, and special symbol.</small>
                        </div>
                        <div class="col-12 d-grid">
                            <button class="btn btn-primary">Reset Password</button>
                        </div>
                    </form>
                {% else %}
                    <form method="post" class="row g-3">
                        <input type="hidden" name="action" value="send_forgot_otp">
                        <div class="col-12">
                            <label class="form-label">Registered Email</label>
                            <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="col-12 d-grid">
                            <button class="btn btn-primary">Send OTP</button>
                        </div>
                    </form>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
