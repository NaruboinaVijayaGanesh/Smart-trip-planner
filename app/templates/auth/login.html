{% from "partials/phone_input.html" import phone_input %}
{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="mb-3">Sign In</h3>
                <form method="post" class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="col-12">
                        {{ phone_input("loginPhone", "Phone Number (for WhatsApp alerts)") }}
                    </div>
                    <div class="col-12 form-check">
                        <input type="checkbox" name="whatsapp_opt_in" class="form-check-input" id="whatsAppOptInLogin" checked>
                        <label class="form-check-label" for="whatsAppOptInLogin">Send trip updates to WhatsApp</label>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <input id="loginPassword" type="password" name="password" class="form-control" required>
                            <button class="btn btn-outline-secondary password-toggle" type="button" data-target="loginPassword">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-12 form-check">
                        <input type="checkbox" name="remember" class="form-check-input" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">Remember me</label>
                    </div>
                    <div class="col-12 text-end">
                        <a href="{{ url_for('auth.forgot_password') }}" class="small">Forgot password?</a>
                    </div>
                    <div class="col-12 d-grid">
                        <button class="btn btn-dark">Login</button>
                    </div>
                    <div class="col-12 d-grid">
                        <a class="btn btn-outline-danger" href="/auth/google/start?mode=login">
                            <i class="bi bi-google me-2"></i>Continue with Google
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
