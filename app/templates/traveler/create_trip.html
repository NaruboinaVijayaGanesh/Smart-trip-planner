{% extends "base.html" %}
{% block title %}Create Trip{% endblock %}
{% block content %}
<section class="classic-banner mb-4">
    <img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=1600&q=80" alt="Aerial beach view">
    <div class="classic-banner-content">
        <p class="mb-1">Trip Composer</p>
        <h2 class="mb-0">Share your plan and let AI craft the itinerary</h2>
    </div>
</section>

<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <h3 class="mb-3"><i class="bi bi-airplane-engines me-2"></i>Create Trip</h3>
        <form method="post" action="{{ url_for('traveler.create_trip') }}" id="trip-form">
            <div class="row g-3 mb-1">
                <div class="col-md-6">
                    <label class="form-label"><i class="bi bi-person-badge me-1"></i>Assign Agent</label>
                    <select class="form-select" name="agent_id" required>
                        <option value="">Select agent</option>
                        {% for agent in all_agents %}
                            <option value="{{ agent.id }}">{{ agent.full_name }} ({{ agent.email }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            {% set include_client = False %}
            {% include "partials/trip_form_fields.html" %}
            <div class="mt-4 d-grid d-md-flex justify-content-md-end">
                <button class="btn btn-primary btn-lg"><i class="bi bi-magic me-2"></i>Generate Trip</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
